# How to Use This List with Cambridge Books

## Before Reading Practice

1. Review Sections A, B, D, E, F, G.
2. Underline keywords in the question.
3. Think of synonyms before looking at the passage.

## Before Listening Practice

1. Review Sections C and D.
2. Predict answer type: noun, number, date, adjective, place.
3. Watch for distractors and corrections by speakers.

## Before Writing Practice

1. Use Section R for Task 1.
2. Use Section S and U for Task 2.
3. Avoid memorizing full essays.

## Before Speaking Practice

1. Use Section T.
2. Combine phrase + reason + example.
3. Speak naturally, not like a memorized script.

## Cambridge Practice Rule

Every time you finish a Cambridge test, write down:

* 10 unknown words from Reading
* 10 paraphrases from Reading questions
* 10 listening distractors or missed words
* 5 phrases to reuse in Writing/Speaking

This method will convert vocabulary into active Band 7 language.
