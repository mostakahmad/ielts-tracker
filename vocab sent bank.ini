# Cambridge IELTS Practice Vocabulary Master List

This list is designed for solving Cambridge IELTS Academic practice books. It focuses on words and phrases that help with:

* Reading question instructions
* Listening prediction
* Synonym matching
* Academic passage understanding
* Writing Task 1 reports
* Writing Task 2 essays
* Speaking answers

**Important:** This is not copied from any Cambridge book. It is an original vocabulary bank built around Cambridge-style IELTS practice needs.

