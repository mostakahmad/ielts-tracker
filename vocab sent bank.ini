# IELTS Band 7+ 45-Day Vocabulary Master List

## Important Rule

This is an active vocabulary plan. Do not only memorize the words. For each day, read the Bangla meaning, say the sentence aloud, then use at least 5 items in speaking and 5 items in writing.

**Daily target:** 18 words/collocations × 45 days = 810 active vocabulary items.

