# How to Use This Master List Efficiently

## Daily Method

1. Read the 18 items of the day.
2. Learn Bangla meaning.
3. Say each sentence aloud.
4. Write 5 new sentences using 5 items.
5. Use 5 items in a 2-minute speaking answer.
6. Review yesterday’s 18 items before learning new ones.

## Weekly Review Method

* Day 7: Review Days 1–6.
* Day 14: Review Days 8–13.
* Day 21: Review Days 15–20.
* Day 28: Review Days 22–27.
* Day 35: Review Days 29–34.
* Day 45: Review the full list.

## Band 7 Rule

For IELTS Band 7+, do not use rare words unnaturally. Use topic vocabulary, collocations, and accurate grammar naturally.

Example:

* Weak: Technology is very good for people.
* Better: Technological advancement has a positive impact on communication and education.

Example:

* Weak: Pollution is bad for children.
* Better: Serious environmental pollution can be detrimental to children’s health.







