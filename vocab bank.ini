# IELTS Band 7+ + Cambridge Practice Combined Unique Vocabulary Bank

This is the combined master bank from the previous two lists:

1. **45-Day IELTS Band 7+ Vocabulary Master List**
2. **Cambridge IELTS Practice Vocabulary Master List**

Repeated items are kept only once. I also added extra high-value IELTS/Cambridge practice vocabulary where useful.

Use this as your full active vocabulary bank for:

* IELTS Academic Reading
* IELTS Listening
* IELTS Writing Task 1
* IELTS Writing Task 2
* IELTS Speaking Part 1, 2, and 3
* Cambridge IELTS book practice

