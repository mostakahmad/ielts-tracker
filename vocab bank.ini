# How to Use This Combined Bank

## For Cambridge Reading

* Review sections A, C, D, E, and F.
* Focus especially on synonyms, academic verbs, and paragraph-purpose words.

## For Cambridge Listening

* Review sections B and C.
* Before audio starts, predict answer type: name, number, place, noun, adjective, or date.

## For Writing Task 1

* Review section Q.
* Use trend verbs, comparison words, and overview vocabulary.

## For Writing Task 2

* Review sections F, G to P, and S.
* Use topic vocabulary naturally, not forcefully.

## For Speaking

* Review section R and topic sections.
* Use phrase + reason + example.

## Best Study Method

Daily routine:

1. Learn 20 items.
2. Say the Bangla meaning.
3. Make 5 original sentences.
4. Use 5 items in speaking.
5. Use 5 items in writing.
6. Review after 2 days and 7 days.

This combined list contains **1,230 unique vocabulary items, phrases, collocations, and IELTS/Cambridge expressions**. It is more than enough as a vocabulary base for IELTS Band 7+, provided you use it actively and accurately.
